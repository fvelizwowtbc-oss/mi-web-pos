{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block extra_css %}
<style>
    body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .register-container {
        width: 100%;
        max-width: 460px;
        padding: 1rem;
    }
    
    .register-card {
        background: white;
        border-radius: 20px;
        padding: 2.5rem;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        animation: fadeInUp 0.6s ease-out;
    }
</style>
{% endblock %}
{% block content %}
<div class="register-container">
    <div class="register-card">
        <div class="text-center mb-4">
            <div style="width: 64px; height: 64px; background: linear-gradient(135deg, #667eea, #764ba2); 
                 border-radius: 16px; display: inline-flex; align-items: center; justify-content: center; font-size: 2rem; color: white;">
                <i class="bi bi-person-plus"></i>
            </div>
            <h3 class="fw-bold mt-3 mb-1">Crear Cuenta</h3>
            <p class="text-muted">Completa tus datos para registrarte</p>
        </div>
        
        <form method="POST">
            <div class="form-floating mb-3">
                <input type="text" class="form-control" id="nombre" name="nombre" 
                       placeholder="Tu nombre" required>
                <label for="nombre"><i class="bi bi-person me-1"></i> Nombre completo *</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="email" class="form-control" id="email" name="email" 
                       placeholder="nombre@ejemplo.com" required>
                <label for="email"><i class="bi bi-envelope me-1"></i> Email *</label>
            </div>
            
            <div class="form-floating mb-3">
                <input type="password" class="form-control" id="password" name="password" 
                       placeholder="Mínimo 6 caracteres" required minlength="6">
                <label for="password"><i class="bi bi-lock me-1"></i> Contraseña *</label>
            </div>
            
            <div class="form-floating mb-4">
                <input type="tel" class="form-control" id="telefono" name="telefono" 
                       placeholder="04141234567">
                <label for="telefono"><i class="bi bi-telephone me-1"></i> Teléfono</label>
            </div>
            
            <button type="submit" class="btn btn-primary w-100 btn-lg mb-3">
                <i class="bi bi-check-circle me-2"></i> Registrarse
            </button>
            
            <p class="text-center text-muted mb-0">
                ¿Ya tienes cuenta? 
                <a href="{{ url_for('login') }}" class="text-primary fw-semibold text-decoration-none">
                    Inicia sesión
                </a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
